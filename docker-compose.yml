version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pharmacy-pos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pharmacy_pos
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: pharmacy-pos-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:root@mysql:3306/pharmacy_pos
      PORT: 3000
      JWT_SECRET: your-secret-key
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  mysql_data:
